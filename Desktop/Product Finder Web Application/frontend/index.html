<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechNest - Premium Product Finder</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
</head>
  <body>
    <header class="header">
      <div class="header-left">
        <h1>🔍 TechNest</h1>
      </div>
      <div class="header-right" id="userInfo" style="display: none;">
        <span id="welcomeMsg"></span>
        <span id="roleBadge" class="role-badge"></span>
        <button id="dashboardBtn" class="dashboard-btn" style="display: none;">Dashboard</button>
        <button id="logoutBtn" class="logout-btn">Logout</button>
      </div>
    </header>

    <main class="main-container">
      <!-- Left Pane - Filters -->
      <aside class="filters-pane" id="filtersPane">
        <h2>Filters</h2>

        <!-- Brand Filter -->
        <div class="filter-group">
          <label for="brandFilter">Brand:</label>
          <select id="brandFilter" class="filter-select">
            <option value="">Select Brand</option>
          </select>
        </div>

        <!-- Category Filter -->
        <div class="filter-group">
          <label for="categoryFilter">Category:</label>
          <select id="categoryFilter" class="filter-select">
            <option value="">Select Category</option>
          </select>
        </div>

        <!-- Price Max Filter -->
        <div class="filter-group">
          <label for="priceFilter">Price Max:</label>
          <input
            type="number"
            id="priceFilter"
            class="filter-input"
            placeholder="1000"
          />
        </div>

        <!-- RAM Filter -->
        <div class="filter-group">
          <label for="ramFilter">RAM:</label>
          <select id="ramFilter" class="filter-select">
            <option value="">Select RAM</option>
          </select>
        </div>

        <!-- Storage Filter -->
        <div class="filter-group">
          <label for="storageFilter">Storage:</label>
          <select id="storageFilter" class="filter-select">
            <option value="">Select Storage</option>
          </select>
        </div>

        <!-- Color Filter -->
        <div class="filter-group">
          <label for="colorFilter">Color:</label>
          <select id="colorFilter" class="filter-select">
            <option value="">Select Color</option>
          </select>
        </div>
      </aside>

      <!-- Right Pane - Products -->
      <section class="products-pane" id="productsPane">
        <!-- Selected Filters -->
        <div class="selected-filters">
          <span class="selected-filters-label">Selected Filters:</span>
          <div class="filter-chips" id="filterChips">
            <!-- Chips will be added dynamically -->
          </div>
        </div>

        <!-- Products Section -->
        <div class="products-header">
          <h2>Products:</h2>
          <span class="loading-text" id="loadingText" style="display: none"
            >Loading...</span
          >
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid">
          <!-- Products will be loaded dynamically -->
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
          <!-- Pagination will be added dynamically -->
        </div>
      </section>

      <!-- Product Details (Hidden by default) -->
      <section
        class="product-details-pane"
        id="productDetailsPane"
        style="display: none"
      >
        <button class="back-btn" id="backBtn">&lt; Back</button>

        <div class="details-content">
          <h2>Product Details</h2>
          <hr />

          <h3 id="detailProductName"></h3>
          <p id="detailProductDescription"></p>

          <h4>Specifications:</h4>
          <ul id="detailSpecs" class="specs-list">
            <!-- Specs will be loaded dynamically -->
          </ul>

          <h4>Vendors:</h4>
          <ul id="detailVendors" class="vendors-list">
            <!-- Vendors will be loaded dynamically -->
          </ul>
        </div>
      </section>

      <!-- Dashboard Pane (Hidden by default) -->
      <section class="management-pane" id="managementPane" style="display: none">
        <button class="back-btn" id="dashBackBtn">&lt; Back to Products</button>
        <div id="vendorDashboard" style="display: none;">
          <h2>Vendor Dashboard</h2>
          <div class="action-bar">
            <button id="openAddProductModal" class="add-btn">+ Add New Product</button>
          </div>
          <div id="vendorProducts" class="mgmt-grid">
            <!-- Vendor products list -->
          </div>
        </div>

        <div id="adminDashboard" style="display: none;">
          <h2>Admin Control Panel</h2>
          <div class="tabs">
            <button class="tab-btn active" data-tab="mgmtUsers">Users</button>
            <button class="tab-btn" data-tab="mgmtProducts">All Products</button>
            <button class="tab-btn" data-tab="mgmtVendors">Vendors</button>
          </div>
          <div id="mgmtUsers" class="tab-content">
            <div class="action-bar">
              <button id="openAddAdminModal" class="add-btn" style="background: #dc2626;">+ Create New Admin User</button>
            </div>
            <div id="usersTableContainer">
              <!-- User management table -->
            </div>
          </div>
          <div id="mgmtProducts" class="tab-content" style="display: none;">
            <!-- Global product management -->
            <div id="adminProductsContainer" class="mgmt-grid"></div>
          </div>
          <div id="mgmtVendors" class="tab-content" style="display: none;">
            <!-- Vendor management -->
            <div id="vendorsTableContainer"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- Add Product Modal -->
    <div id="addProductModal" class="modal">
      <div class="modal-content">
        <h3>Add New Product</h3>
        <form id="addProductForm" class="auth-form">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="newProdName" required>
          </div>
          <div class="form-group">
            <label>Brand</label>
            <input type="text" id="newProdBrand" required>
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="newProdCategory" required>
              <option value="Smartphones">Smartphones</option>
              <option value="Laptops">Laptops</option>
              <option value="Tablets">Tablets</option>
              <option value="Headphones">Headphones</option>
              <option value="Smartwatches">Smartwatches</option>
            </select>
          </div>
          <div class="form-group">
            <label>Price ($)</label>
            <input type="number" step="0.01" id="newProdPrice" required>
          </div>
          <div class="form-group">
            <label>Short Description</label>
            <input type="text" id="newProdShortDesc" required>
          </div>
          <div class="form-group">
            <label>Initial Stock</label>
            <input type="number" id="newProdStock" value="10" required>
          </div>
          <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="auth-btn">Save Product</button>
            <button type="button" class="auth-btn" id="closeModal" style="background: #9ca3af;">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Create Admin Modal -->
    <div id="addAdminModal" class="modal">
      <div class="modal-content">
        <h3>Create New Admin Account</h3>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">This user will have full access to manage products and other users.</p>
        <form id="addAdminForm" class="auth-form">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="newAdminUser" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="newAdminEmail" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="newAdminPass" required>
          </div>
          <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="auth-btn" style="background: #dc2626;">Create Admin</button>
            <button type="button" class="auth-btn" id="closeAdminModal" style="background: #9ca3af;">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
