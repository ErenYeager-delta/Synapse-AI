{% extends 'chat/base.html' %}
{% load static %}
{% block title %}Sign In &mdash; Synapse AI{% endblock %}

{% block body %}
<div class="mesh-bg"></div>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="brand" style="justify-content:center;">&#9889; <span>Synapse</span> AI</a>
            <p class="auth-subtitle">Sign in to continue your coding journey.</p>
        </div>

        {% if error %}
        <div class="error-message">&#9888;&#65039; {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login/">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="your_username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
            </div>
            <button type="submit" class="btn-primary">Sign In &rarr;</button>
        </form>

        <div class="auth-footer">
            <p>Don&#39;t have an account? <a href="/signup/" class="auth-link">Join the Beta</a></p>
        </div>
    </div>
</div>
{% endblock %}
