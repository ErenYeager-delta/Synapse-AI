<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Synapse AI{% endblock %}</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'chat/css/styles.css' %}">
    
    <!-- Favicons & App Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'chat/images/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'chat/images/favicon-32x32.png' %}">
    <link rel="shortcut icon" href="{% static 'chat/images/favicon.ico' %}">
    <link rel="manifest" href="{% url 'manifest' %}">
    <meta name="theme-color" content="#05090a">
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}
    {% block extra_scripts %}{% endblock %}
</body>
</html>
